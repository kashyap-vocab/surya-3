version: "3.9"

services:

  llm-backend:
    image: dronavocab/llm_surya3:v1
    build:
      context: .
      dockerfile: Dockerfile

    container_name: surya3-llm-backend

    env_file: .env

    environment:
      HF_TOKEN: ${HF_TOKEN}
      N_GPU_LAYERS: ${N_GPU_LAYERS:-0}
      FLASH_ATTN: ${FLASH_ATTN:-}

    volumes:
      - model_cache:/models

    restart: unless-stopped

    # If you are running on a machine with an NVIDIA GPU and have the NVIDIA Container Toolkit installed,
    # uncomment the following `deploy` block to allow the container to access the GPU.
    # Note: Even if you uncomment this, the model will run on CPU unless you also set N_GPU_LAYERS=999 in the .env file.
    
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # ── Wrapper ───────────────────────────────────────────────────────────────
  surya-api:
    image: dronavocab/llm_surya3:wrapper

    build:
      context: .
      dockerfile: Dockerfile.wrapper

    container_name: surya3-api

    ports:
      - "9000:9000"

    environment:
      # Updated to use the new port 8002 that the llama.cpp server is running on
      INTERNAL_LLM_URL: http://llm-backend:8002/v1/chat/completions
      INTERNAL_MODEL: ${MODEL_ID}
      PUBLIC_MODEL_NAME: surya-3
      BACKEND_IDENTITY: "Surya AI"
      WRAPPER_PORT: "9000"
      LOG_FILE: /app/logs/requests.log

    volumes:
      - ./logs:/app/logs

    depends_on:
      - llm-backend

    restart: unless-stopped

volumes:
  model_cache:
    driver: local